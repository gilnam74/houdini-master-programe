<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gaussian Splat Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #viewer-container {
      position: fixed;
      inset: 0;
    }

    /* ── Top Bar ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
      backdrop-filter: blur(0px);
    }

    #topbar h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
      flex-shrink: 0;
    }

    #url-input {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 7px 12px;
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    #url-input::placeholder { color: rgba(255,255,255,0.3); }
    #url-input:focus { border-color: rgba(255,255,255,0.4); }

    #load-btn {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      padding: 7px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    #load-btn:hover { background: rgba(255,255,255,0.2); }

    /* ── Drop Zone ── */
    #dropzone {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.3s;
    }

    #dropzone.hidden { opacity: 0; pointer-events: none; }

    #dropzone-box {
      border: 2px dashed rgba(255,255,255,0.25);
      border-radius: 20px;
      width: min(480px, 90vw);
      padding: 60px 40px;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }

    #dropzone-box.drag-over {
      border-color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.05);
    }

    #dropzone-box svg {
      opacity: 0.4;
      margin-bottom: 20px;
    }

    #dropzone-box h2 {
      font-size: 18px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      margin-bottom: 8px;
    }

    #dropzone-box p {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      line-height: 1.6;
    }

    #file-input { display: none; }

    /* ── Loading ── */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(8px);
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    #loading-label {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
    }

    #progress-bar-wrap {
      width: 240px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #fff;
      border-radius: 99px;
      transition: width 0.2s;
    }

    /* ── Controls hint ── */
    #controls-hint {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 20px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 8px 18px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #controls-hint.visible { opacity: 1; }
    #controls-hint span { display: flex; align-items: center; gap: 5px; }
    #controls-hint kbd {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: inherit;
    }

    /* ── File info ── */
    #file-info {
      position: fixed;
      top: 56px;
      left: 16px;
      z-index: 100;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      opacity: 0;
      transition: opacity 0.3s;
    }
    #file-info.visible { opacity: 1; }

    /* ── Error ── */
    #error-toast {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      background: rgba(220, 60, 60, 0.9);
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 13px;
      color: #fff;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    #error-toast.visible { opacity: 1; }
  </style>
</head>
<body>

  <div id="viewer-container"></div>

  <!-- Top Bar -->
  <div id="topbar">
    <h1>SPLAT VIEWER</h1>
    <input id="url-input" type="text" placeholder="Paste .splat / .ply URL and press Enter…" />
    <button id="load-btn">Load URL</button>
  </div>

  <!-- Drop Zone -->
  <div id="dropzone">
    <div id="dropzone-box">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" stroke="white" stroke-width="1.5"/>
        <path d="M24 14v14M17 21l7-7 7 7" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 34h20" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <h2>Drop your splat file here</h2>
      <p>Supports .splat · .ply · .ksplat<br>or click to browse</p>
    </div>
    <input id="file-input" type="file" accept=".splat,.ply,.ksplat" />
  </div>

  <!-- Loading -->
  <div id="loading" class="hidden">
    <div id="loading-label">Loading…</div>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
  </div>

  <!-- Controls Hint -->
  <div id="controls-hint">
    <span><kbd>Drag</kbd> Rotate</span>
    <span><kbd>Scroll</kbd> Zoom</span>
    <span><kbd>Right Drag</kbd> Pan</span>
    <span><kbd>R</kbd> Reset</span>
  </div>

  <!-- File Info -->
  <div id="file-info"></div>

  <!-- Error Toast -->
  <div id="error-toast"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "@mkkellogg/gaussian-splats-3d": "https://unpkg.com/@mkkellogg/gaussian-splats-3d@0.4.4/build/gaussian-splats-3d.module.min.js"
    }
  }
  </script>

  <script type="module">
    import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

    // ── DOM refs ──
    const viewerEl    = document.getElementById('viewer-container');
    const dropzone    = document.getElementById('dropzone');
    const dropbox     = document.getElementById('dropzone-box');
    const fileInput   = document.getElementById('file-input');
    const urlInput    = document.getElementById('url-input');
    const loadBtn     = document.getElementById('load-btn');
    const loadingEl   = document.getElementById('loading');
    const loadingLbl  = document.getElementById('loading-label');
    const progressBar = document.getElementById('progress-bar');
    const hintsEl     = document.getElementById('controls-hint');
    const fileInfoEl  = document.getElementById('file-info');
    const errorToast  = document.getElementById('error-toast');

    let viewer = null;
    let blobUrl = null;

    // ── Viewer factory ──
    function createViewer() {
      if (viewer) {
        try { viewer.dispose(); } catch(e) {}
        viewer = null;
      }
      viewer = new GaussianSplats3D.Viewer({
        rootElement: viewerEl,
        selfDrivenMode: true,
        useBuiltInControls: true,
        initialCameraPosition: [0, -3, 6],
        initialCameraLookAt: [0, 0, 0],
        antialiased: true,
        dynamicScene: false,
      });
    }

    // ── Load splat from URL or blob ──
    function getSceneFormat(ext) {
      switch ((ext || '').toLowerCase()) {
        case 'ply':
          return GaussianSplats3D.SceneFormat.Ply;
        case 'splat':
          return GaussianSplats3D.SceneFormat.Splat;
        case 'ksplat':
          return GaussianSplats3D.SceneFormat.KSplat;
        default:
          return undefined;
      }
    }

    async function loadSplat(url, label, format) {
      showLoading('Initializing…');
      setProgress(0);

      try {
        createViewer();

        await viewer.addSplatScene(url, {
          format,
          progressiveLoad: true,
          onProgress: (percent, message) => {
            setProgress(Math.round(percent));
            loadingLbl.textContent = message || `Loading… ${Math.round(percent)}%`;
          }
        });

        viewer.start();

        hideLoading();
        dropzone.classList.add('hidden');
        hintsEl.classList.add('visible');
        fileInfoEl.textContent = label;
        fileInfoEl.classList.add('visible');

      } catch (err) {
        console.error(err);
        hideLoading();
        showError('Failed to load: ' + (err.message || 'Unknown error'));
        dropzone.classList.remove('hidden');
      }
    }

    // ── File drop / click ──
    dropbox.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      handleFile(file);
    });

    ;['dragenter', 'dragover'].forEach(eventName => {
      dropzone.addEventListener(eventName, e => {
        e.preventDefault();
        e.stopPropagation();
        dropbox.classList.add('drag-over');
      });
    });
    dropzone.addEventListener('dragleave', e => {
      e.preventDefault();
      e.stopPropagation();
      if (!dropzone.contains(e.relatedTarget)) dropbox.classList.remove('drag-over');
    });
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      dropbox.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    function handleFile(file) {
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['splat','ply','ksplat'].includes(ext)) {
        showError('Unsupported format. Use .splat, .ply, or .ksplat');
        return;
      }
      if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }
      blobUrl = URL.createObjectURL(file);
      const sizeStr = (file.size / 1024 / 1024).toFixed(1) + ' MB';
      loadSplat(blobUrl, `${file.name}  ·  ${sizeStr}`, getSceneFormat(ext));
    }

    // ── URL load ──
    function loadFromUrl() {
      const url = urlInput.value.trim();
      if (!url) return;
      const fileName = url.split('/').pop().split('?')[0];
      const ext = fileName.split('.').pop().toLowerCase();
      loadSplat(url, fileName, getSceneFormat(ext));
    }
    loadBtn.addEventListener('click', loadFromUrl);
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadFromUrl(); });

    // ── Reset camera on R ──
    const defaultSceneUrl = './koala.ply';
    urlInput.value = defaultSceneUrl;
    loadSplat(defaultSceneUrl, 'koala.ply', getSceneFormat('ply'));

    document.addEventListener('keydown', e => {
      if (e.key === 'r' || e.key === 'R') {
        if (viewer) {
          viewer.camera.position.set(0, -3, 6);
          viewer.camera.lookAt(0, 0, 0);
        }
      }
    });

    // ── Helpers ──
    function showLoading(msg) {
      loadingLbl.textContent = msg || 'Loading…';
      loadingEl.classList.remove('hidden');
    }
    function hideLoading() {
      loadingEl.classList.add('hidden');
    }
    function setProgress(pct) {
      progressBar.style.width = pct + '%';
    }
    function showError(msg) {
      errorToast.textContent = msg;
      errorToast.classList.add('visible');
      setTimeout(() => errorToast.classList.remove('visible'), 3500);
    }
  </script>
</body>
</html>
